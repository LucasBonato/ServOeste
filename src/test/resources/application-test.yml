spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

security:
  jwt:
    secret: some-secret-for-test-and-some-more-things-id
    valid-time: 60000
    refresh-time: 120000

management:
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        url: ${OTEL_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/logs